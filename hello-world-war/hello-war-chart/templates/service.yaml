apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-hello-chart
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ .Release.Name }}-hello-chart
  ports:
  - protocol: TCP
    port: {{ .Values.service.port }}
    targetPort: 8080
    nodePort: {{ .Values.service.nodePort }}
